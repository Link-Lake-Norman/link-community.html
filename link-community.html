<script>
  // 1. Your Google Script URL
  const scriptURL = 'https://script.google.com/macros/s/AKfycbwjW2rYsTX-DOVm1QZrzFmVsv2DZpBhggwvm3NH5t389UGPrc4Bn5-3t64hgXzo-FiBkA/exec';

  // 2. This handles ALL forms and sends them to the correct Tab
  document.querySelectorAll('form').forEach(form => {
    form.addEventListener('submit', e => {
      e.preventDefault();
      
      const btn = form.querySelector('button[type="submit"]') || form.querySelector('button');
      const originalBtnText = btn.innerHTML;
      
      btn.disabled = true;
      btn.innerHTML = "Processing...";

      const formData = new FormData(form);
      
      // This tells Google which tab to use based on the form's "name" attribute
      formData.append('formName', form.getAttribute('name') || 'General Submissions');

      fetch(scriptURL, { method: 'POST', body: formData })
        .then(response => {
          alert("Success! Your information has been saved.");
          btn.disabled = false;
          btn.innerHTML = originalBtnText;
          form.reset();
        })
        .catch(error => {
          console.error('Error!', error.message);
          alert("Connection Error. Please check your Google Script 'Anyone' settings.");
          btn.disabled = false;
          btn.innerHTML = originalBtnText;
        });
    });
  });

  // 3. Tab Switching Logic
  document.querySelectorAll('[data-tab-target]').forEach(tab => {
    tab.addEventListener('click', () => {
      const target = document.querySelector(tab.dataset.tabTarget);
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      target.classList.add('active');
    });
  });
</script>
