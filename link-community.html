<script>
  // 1. Paste your NEW URL here
 const scriptURL = 'https://script.google.com/macros/s/AKfycbwjW2rYsTX-DOVm1QZrzFmVsv2DZpBhggwvm3NH5t389UGPrc4Bn5-3t64hgXzo-FiBkA/exec';
  // 2. This handles ALL forms (Volunteer, Student, Nonprofit, etc.)
  document.querySelectorAll('form').forEach(form => {
    form.addEventListener('submit', e => {
      e.preventDefault();
      const btn = form.querySelector('button');
      btn.disabled = true;
      btn.innerHTML = "Processing...";

      fetch(scriptURL, { method: 'POST', body: new FormData(form)})
        .then(response => {
          alert("Success! Your information has been saved.");
          btn.disabled = false;
          btn.innerHTML = "Submit";
          form.reset();
        })
        .catch(error => {
          console.error('Error!', error.message);
          alert("Connection Error. Please try again.");
          btn.disabled = false;
        });
    });
  });

  // 3. This makes your TABS switch properly
  document.querySelectorAll('[data-tab-target]').forEach(tab => {
    tab.addEventListener('click', () => {
      const target = document.querySelector(tab.dataset.tabTarget);
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      target.classList.add('active');
    });
  });
</script>
